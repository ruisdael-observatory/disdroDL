
######### NETCDF ###########
dimensions:
    time:
        size: #None: to create an unlimited dimension (a dimension that can be appended to), the size value is set to None or 0.
    diameter_classes:
        size: 32
    velocity_classes:
        size: 32
    # diameter:
    #     size:
    # velocity:
    #     size:
variables:
    time:
        dimensions:
            - time
        dtype: 'f4'         
        var_attrs:
            long_name: "Time UTC"
            standard_name: "time"
            axis: "T"
            calendar: "standard"
    interval:
        dimensions:  # empty for scalar variables
        dtype: 'i4'            
        value:
            - 60
        var_attrs:
            units: s
            long_name: 'Length of measurement interval'
            standard_name: 'time_interval'
    timestamp:
        dimensions:
            - time
        dtype: 'S4'  # string
        var_attrs:
            long_name: 'UTC timestamp (iso 8601) string from telegram request moment'
            standard_name: 'timestamp'
    velocity_classes_center:
        dimensions:
            - velocity_classes
        dtype: 'f8'  # 64bit floating point        
        var_attrs:
