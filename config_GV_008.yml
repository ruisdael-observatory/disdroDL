port: '/dev/ttyUSB0'
baud: 19200
Parsivel_name: PAR008
Parsivel_ID: 008
station_site: 'Delft'  # add prefix Camp for a campaign ie CampRotterdam
station_name: 'GV' # keep under 10 characters, max accepted by Parsivel
script_name: 'capture_disdro_data.py'
data_dir: '/data/disdroDL/'
log_dir: '/var/log/disdroDL/'

telegram_fields:
  '01': Rain intensity
    unit: mm/h
  '02': Rain amount accumulated 
		unit: mm
  '03': Weather code to SYNOP waw
  '04': Weather code to SYNOP ww
  '05': Weather co de METAR/SPECI
  '06': Weather co de according to NWS 
  '07': Radar reflectivity 
		unit: dBz
  '08': MOR visibility in precipitation 
		unit: m
  '09': Sample interval 
		unit: s
  '10': Signal amplitude of the laser strip
  '11': Number of particles detected and validated
  '12': Temperature in the sen sor housing 
		unit: °C
  '13': Sensor serial number
  '14': Firmware IOP version number
  '15': Firmware DSP version number
  '16': Sensor head heating current 
		unit: A
  '17': Power supply voltage 
		unit: V
  '18': Sensor status
  '19': Date/time measuring start
  '20': Sensor time
  '21': Sensor date
  '22': Station name
  '23': Station number
  '24': Rain amount absolute 
		unit: mm
  '25': Error code
  '26': Temperature PCB 
		unit: °C
  '27': Temperature right sensor head 
		unit: °C  
  '28': Temperature left sensor head 
		unit: °C  
  '30': Rain intensity max. 30.000 mm/h
		unit: mm/h
  '31': Rain intensity max. 1200.0 mm/h
		unit: mm/h
  '32': Rain amount accumulate 
		unit: mm
  '33': Radar reflectivit 
		unit: dBz
  '34': Kinetic energy 
  		unit: J/(m2h)
  '35': Snow depth intensity
		unit: mm/h  
  '60': Number of all particles detected
  '61': List of all particles detected (particle-size speed) 
    unit: mm, mm/h 
  '90': Field N
		unit: log 10 (1/m 3 mm)
  '91': Field v
		unit: m/s
  '93': Raw data