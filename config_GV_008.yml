# global attributes (all will be written to netCDF as global attributes)
global_attrs:
    title: 'OTT Parsivel2 disdrometer data'
    institution: 'Delft University of Technology'
    source: 'surface observation'
    history: '-'
    Conventions: 'CF-1.7'
    site_name: 'Green_Village'
    sensor_name: PAR008
    project_name: 'https://ruisdael-observatory.nl/'
    contributors: 'Marc Schleiss, Saverio Guzzo, Rob Mackenzie, Andre Castro'
    sensor_type: 'OTT Hydromet Parsivel2'
    sensor_serial_number: '450994'
    NETDL_number: '1'

# sensor and script settings
station_code: 'GV' # keep under 10 characters, max accepted by Parsivel
port: '/dev/ttyUSB0'
baud: 19200
script_name: 'capture_disdro_data.py'
data_dir: '/data/disdroDL/'
log_dir: '/var/log/disdroDL/'

dimensions:
    time:
        size: #None: to create an unlimited dimension (a dimension that can be appended to), the size value is set to None or 0.
    diameter:
        size: 32
    velocity:
        size: 32

variables:
    latitude:
        dimensions: # empty for scalar variables
        dtype: 'f4'  # 32bit floating point
        value: 
            - 51.9675917
        var_attrs: 
            units: 'degree_north'
            long_name: 'Latitude of site'
            standard_name: 'latitude'
    longitude:
        dimensions:  # empty for scalar variables
        dtype: 'f4'  # 32bit floating point
        value: 
            - 4.927277
        var_attrs: 
            units: 'degree_east'
            long_name: 'Longitude of site'
            standard_name: 'longitude'
    altitude:
        dimensions:  # empty for scalar variables
        dtype: 'i1'  # 32bit floating point
        value: 
            - 1
        var_attrs: 
            units: 'm'
            long_name: 'Altitude of site'
            standard_name: 'altitude'
    time:
        dimensions:
            - time
        dtype: 'f8'  # 64bit floating point        
        var_attrs:
            long_name: "Time UTC"
            standard_name: "time"
            axis: "T"
            calendar: "standard"
    interval:
        dimensions:  # empty for scalar variables
        dtype: 'i1'  # 8bit signed integer (0-255)         
        value:
            - 60
        var_attrs:
            units: s
            long_name: 'Length of measurement interval'
            standard_name: 'interval'
    timestamp:
        dimensions:
            - time
        dtype: 'S4'  # string
        var_attrs:
            long_name: 'UTC timestamp (iso 8601) string from telegram request moment'
            standard_name: 'timestamp'
    velocity:
        dimensions:
            - velocity
        dtype: 'f8'  # 64bit floating point        
        var_attrs:
            long_name: 'Center fall velocity of precipitation particles'
            standard_name: 'velocity'
            units: 'm s-1'
            comment: 'Predefined velocity classes.'
        value: 
            - 0.05
            - 0.15
            - 0.25
            - 0.35
            - 0.45
            - 0.55
            - 0.65
            - 0.75
            - 0.85
            - 0.95
            - 1.1
            - 1.3
            - 1.5
            - 1.7
            - 1.9
            - 2.2
            - 2.6
            - 3
            - 3.4
            - 3.8
            - 4.4
            - 5.2
            - 6
            - 6.8
            - 7.6
            - 8.8
            - 10.4
            - 12
            - 13.6
            - 15.2
            - 17.6
            - 20.8  
    diameter:
        dimensions:
            - diameter
        dtype: 'f8'  # 64bit floating point        
        var_attrs:
            long_name: 'Center diameter of precipitation particles'
            standard_name: 'diameter'
            units: 'm'
            comment: 'Predefined diameter classes.'
        value:
            - 6.25e-05
            - 0.0001875
            - 0.0003125
            - 0.0004375
            - 0.0005625
            - 0.0006875
            - 0.0008125
            - 0.0009375
            - 0.0010625
            - 0.0011875
            - 0.001375
            - 0.001625
            - 0.001875
            - 0.002125
            - 0.002375
            - 0.00275
            - 0.00325
            - 0.00375
            - 0.00425
            - 0.00475
            - 0.0055
            - 0.0065
            - 0.0075
            - 0.0085
            - 0.0095
            - 0.011
            - 0.013
            - 0.015
            - 0.017
            - 0.019
            - 0.0215
            - 0.0245


telegram_fields:
    '01':
        dimensions:
            - time
        dtype: 'f4'  # 32bit floating point                
        var_attrs:
            units: 'mm/h'
            long_name: 'Rain intensity'
            standard_name: 'rain_intensity'
    '02':
        dimensions:
            - time
        dtype: 'f4'                 
        var_attrs:
            units: 'mm'
            long_name: 'Rain amount accumulated'
            standard_name: 'acc_rain_amount'
    '03':
        dimensions:
            - time
        dtype: 'i2'  # 16-bit signed integer               
        var_attrs:
            long_name: 'Weather code to SYNOP wcreate_netCDFaw'
            standard_name: 'code_4680'
    '04':
        dimensions:
            - time
        dtype: 'i2'  # 16-bit signed integer                
        var_attrs:
            long_name: 'Weather code to SYNOP ww'
            standard_name: 'code_4677'
    '05':
        dimensions:
            - time
        dtype: 'S4'  # string            
        var_attrs:
            long_name: 'Weather code METAR/SPECI'
            standard_name: 'code_4678'
            comment: 'Possible values in OTT Parsivel documentation: Table 4678'
    '06':
        dimensions:
            - time
        dtype: 'S4'  # string            
        var_attrs:
            long_name: 'Weather code according to NWS'
            standard_name: 'code_NWS'
            comment: 'Possible values in OTT Parsivel documentation: Table NWS'

    '07':
        dimensions:
            - time
        dtype: 'f4'            
        var_attrs:
            long_name: 'Radar reflectivity'
            standard_name: 'reflectivity'
            units: 'dBz'
    '08':
        dimensions:
            - time
        dtype: 'f4'            
        var_attrs:
            long_name: 'Meteorological Optical Range in precipitation'
            standard_name: 'MOR'
            units: 'm'
    '09':
        dimensions:
            - time
        dtype: 'i2'            
        var_attrs:
            long_name: 'Sample interval'
            standard_name: 'sample_interval'
            units: 's'
    '10':
        dimensions:
            - time
        dtype: 'i4'            
        var_attrs:
            long_name: 'Signal amplitude of the laser strip'
            standard_name: 'amplitude'
            units: '1'
    '11':
        dimensions:
            - time
        dtype: 'i4'            
        var_attrs:
            long_name: 'Number of particles detected and validated'
            standard_name: 'n_particles'
            units: '1'
    '12': # issue with values
        dimensions:
            - time
        dtype: 'f4'            
        var_attrs:
            long_name: 'Temperature in the sensor housing'
            standard_name: 'T_sensor'
            units: '°C'  
    '16': 
        dimensions:
            - time
        dtype: 'f4'            
        var_attrs:
            long_name: 'Sensor head heating current'
            standard_name: 'I_heating'
            units: 'A'
    '17': 
        dimensions:
            - time
        dtype: 'f4'            
        var_attrs:
            long_name: 'Power supply voltage'
            standard_name: 'V_power_supply'
            units: 'V'
    '18': 
        dimensions:
            - time
        dtype: 'f4'            
        var_attrs:
            long_name: 'Sensor status'
            standard_name: 'state_sensor'
            comment: '0=OK, 1=Dirty, 2=No measurement possible'
    '24': 
        dimensions:
            - time
        dtype: 'f4'            
        var_attrs:
            long_name: 'Rain amount absolute'
            standard_name: 'absolute_rain_amount'
            units: 'mm' 
    '25': 
        dimensions:
            - time
        dtype: 'i4'            
        var_attrs:
            long_name: 'Error code'
            standard_name: 'error_code'
            units: '1'
            comment: '0=OK, 1=Screens are dirty; 2=Screens are dirty (no measurements possible), 3=Laser damaged'
    '26': 
        dimensions:
            - time
        dtype: 'f4'            
        var_attrs:
            long_name: 'Temperature PCB'
            standard_name: 'T_pcb'
            units: '°C'            
    '27': 
        dimensions:
            - time
        dtype: 'i4'            
        var_attrs:
            long_name: 'Temperature left sensor head'
            standard_name: 'T_L_sensor_head'
    '28': 
        dimensions:
            - time
        dtype: 'i4'            
        var_attrs:
            long_name: 'Temperature right sensor head'
            standard_name: 'T_R_sensor_head'
            units: '°C' 
    '34': 
        dimensions:
            - time
        dtype: 'f4'
        var_attrs:
            long_name: 'Kinetic energy'
            standard_name: 'kinetic_energy'
            units: 'J/(m^2*h)' 
    '35': 
        dimensions:
            - time
        dtype: 'f4'            
        var_attrs:
            long_name: 'Snow depth intensity'
            standard_name: 'snowfall_intensity'
            units: 'mm/h'
            comment: 'volume equivalent snow depth intensity'
    '90':
        dimensions:
            - time
            - diameter
        dtype: 'f4'
        var_attrs:
            long_name: 'Number of particles per diameter class'
            standard_name: 'fieldN'
            units: '1/(m3*mm)'  # log 10
            comment: 'Jülich netCDF uses variable name: number_concentration'
    '91':
        dimensions:
            - time
            - diameter
        dtype: 'f4'
        var_attrs:
            long_name: 'Average particle velocity per diameter class'
            standard_name: 'fieldV'
            units: 'm/s' 
            comment: 'Jülich netCDF uses variable name: fall_velocity'
    '93': 
        dimensions:
            - time
            - diameter
            - velocity
        dtype: 'f4'            
        var_attrs:
            long_name: 'Raw data as a function of particle diameter and velocity'
            standard_name: 'data_raw'
            units: '1'


  # '61':
  #     name: List of all particles detected (particle-size speed)
  #     unit: 'mm, mm/h'
  # '61size':
  #     name: Particle size
  #     unit: 'mm'
  # '61speed':
  #     name: Particle speed
  #     unit: 'mm/h'
  # '90':
  #     name: Field N  # diameter after filtering
  #     unit: 'log(10)*(1/((m^3)*mm))'
  # '91':
  #     name: Field v # velocity after filtering
  #     unit: 'm/s'
  # '93':
  #     name: Raw data